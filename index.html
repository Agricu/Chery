<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选项卡导航 - 多网页切换显示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* 选项卡容器 */
    .tab-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 选项卡头部 */
    .tab-header {
      display: flex;
      background-color: #f1f1f1;
      border-bottom: 1px solid #ccc;
    }

    /* 选项卡按钮 */
    .tab-btn {
      padding: 12px 24px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
    }

    /* 激活的选项卡按钮 */
    .tab-btn.active {
      border-bottom-color: #2196F3;
      color: #2196F3;
      font-weight: bold;
    }

    .tab-btn:hover:not(.active) {
      background-color: #e9e9e9;
    }

    /* 选项卡内容区域 */
    .tab-content {
      flex: 1;
      position: relative;
    }

    /* iframe容器 - 默认隐藏 */
    .iframe-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    /* 激活的iframe容器 */
    .iframe-wrap.active {
      display: block;
    }

    /* iframe样式 */
    .frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .tab-btn {
        padding: 10px 16px;
        font-size: 14px;
        flex: 1; /* 移动端选项卡均分宽度 */
      }
    }
  </style>
</head>
<body>
  <div class="tab-container">
    <!-- 选项卡头部 -->
    <div class="tab-header">
      <button class="tab-btn active" data-tab="tab1">瑞虎页面</button>
      <button class="tab-btn" data-tab="tab2">星途页面</button>
      <button class="tab-btn" data-tab="tab3">捷途页面</button>
    </div>

    <!-- 选项卡内容 -->
    <div class="tab-content">
      <div class="iframe-wrap active" id="tab1">
        <iframe src="瑞虎/index.html" class="frame"></iframe>
      </div>
      <div class="iframe-wrap" id="tab2">
        <iframe src="星途/index.html" class="frame"></iframe>
      </div>
      <div class="iframe-wrap" id="tab3">
        <iframe src="捷途/index.html" class="frame"></iframe>
      </div>
    </div>
  </div>

  <script>
    // 获取所有选项卡按钮和内容容器
    const tabBtns = document.querySelectorAll('.tab-btn');
    const iframeWraps = document.querySelectorAll('.iframe-wrap');

    // 为每个选项卡按钮添加点击事件
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // 移除所有激活状态
        tabBtns.forEach(b => b.classList.remove('active'));
        iframeWraps.forEach(w => w.classList.remove('active'));

        // 为当前点击的按钮添加激活状态
        btn.classList.add('active');
        // 显示对应的iframe容器
        const targetTab = btn.getAttribute('data-tab');
        document.getElementById(targetTab).classList.add('active');
      });
    });
  </script>
</body>
</html>
